<header>

<nav>

<section class="page-banner">

<h1>Send Enquiry</h1>

<p>
Tell us your business requirement and our team will contact you.
</p>

</section>

<section class="form-section">

<form id="enquiryForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<textarea
id="message"
placeholder="Write Your Requirement"
required>

</textarea>

<button
type="submit"
class="btn">

Submit Enquiry

</button>

</form>

</section>

<script src="js/enquiry.js"></script>
